<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD Clothing Full App</title>
<style>
body{font-family:sans-serif;margin:0;background:#0f0f0f;color:#fff}
header,footer{text-align:center;padding:20px}
.products{display:flex;flex-wrap:wrap;gap:20px;justify-content:center}
.product{background:#1c1c1c;padding:15px;border-radius:10px;width:250px}
button{padding:10px;border:none;background:gold;cursor:pointer}
input,textarea{width:100%;margin:5px 0;padding:8px}
.section{padding:30px}
</style>
</head>
<body>
<header><h1>DD Clothing & Accessories</h1></header>
<section class="section">
<h2>Shop</h2>
<div class="products">
<div class="product"><h3>Kente</h3><button onclick="add('Kente')">Add to Cart</button></div>
<div class="product"><h3>Ankara</h3><button onclick="add('Ankara')">Add to Cart</button></div>
</div>
</section>
<section class="section">
<h2>Cart</h2>
<ul id="cart"></ul>
<button onclick="checkout()">Checkout</button>
</section>
<section class="section">
<h2>Custom Measurements</h2>
<input placeholder="Chest"><input placeholder="Waist"><input placeholder="Length">
<textarea placeholder="Style"></textarea>
<input type="file">
<button onclick="send()">Submit</button>
</section>
<section class="section">
<h2>Tracking</h2>
<input placeholder="Tracking ID"><button>Track</button>
</section>
<section class="section">
<h2>Payments</h2>
<button onclick="pay('momo')">MoMo</button>
<button onclick="pay('bank')">Bank</button>
</section>
<footer>©2026 DD Clothing</footer>
<script>
let cart=[];
function add(item){cart.push(item);render();}
function render(){document.getElementById('cart').innerHTML=cart.map(i=>`<li>${i}</li>`).join('');}
function checkout(){window.open('https://wa.me/233203512890?text='+encodeURIComponent('Order:'+cart.join(',')));}
function send(){window.open('https://wa.me/233203512890?text=Custom order');}
function pay(type){window.open('https://wa.me/233203512890?text=Payment via '+type);}
</script>
</body>
</html>
